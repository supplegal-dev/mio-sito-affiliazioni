<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Essential List | Consigli Esperti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Bottone Amazon Reale */
        .btn-amazon {
            background: linear-gradient(180deg, #f7dfa5 0%, #f0c14b 100%);
            border: 1px solid #a88734;
            border-radius: 8px;
            color: #111;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 24px;
            text-align: center;
            display: block;
            box-shadow: 0 1px 0 rgba(255,255,255,.4) inset;
            transition: all 0.2s;
        }
        .btn-amazon:hover { background: linear-gradient(180deg, #f5d78e 0%, #eeb933 100%); transform: translateY(-1px); }

        .voto-badge { background: #000; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; }
        .correlati-box { background: #f9f9f9; border-radius: 16px; padding: 20px; margin-top: 30px; border: 1px inset #eee; }
        article { border-bottom: 2px solid #f0f0f0; padding-bottom: 60px; margin-bottom: 60px; }
        
        /* FAQ Animation */
        .faq-answer { display: none; }
        .faq-item.active .faq-answer { display: block; }
        .faq-item.active span { transform: rotate(180deg); }
    </style>
</head>
<body class="max-w-2xl mx-auto px-6 !bg-white !text-black">

    <header class="py-12 border-b border-gray-100 mb-8 text-center">
        <h1 class="text-3xl font-900 tracking-tighter uppercase italic">The Essential <span class="text-gray-300">List</span></h1>
        <p class="text-[10px] text-gray-400 tracking-[0.4em] uppercase mt-2 font-bold">Guida agli acquisti intelligenti • Primavera 2026</p>
    </header>

    <nav id="menu-categorie" class="flex space-x-6 overflow-x-auto no-scrollbar pb-6 mb-12 text-[10px] font-bold uppercase tracking-widest text-gray-400 border-b border-gray-50">
        </nav>

    <main id="content-main"></main>

    <footer class="py-20 text-center text-[10px] text-gray-400 uppercase tracking-widest border-t border-gray-100">
        <p>© 2026 THE ESSENTIAL LIST</p>
        <p class="mt-2 font-bold italic text-gray-300">In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
