<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Essential List | Consigli Esperti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Centratura e Layout */
        .container-custom { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        /* Menu Categorie */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #menu-categorie button { transition: all 0.3s; position: relative; }
        #menu-categorie button.active { color: #000; font-weight: 900; }
        #menu-categorie button.active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #000; }

        /* Bottone Amazon Reale */
        .btn-amazon {
            background: linear-gradient(180deg, #f7dfa5 0%, #f0c14b 100%);
            border: 1px solid #a88734;
            border-radius: 8px;
            color: #111;
            font-size: 13px;
            font-weight: 600;
            padding: 14px 24px;
            text-align: center;
            display: block;
            box-shadow: 0 1px 0 rgba(255,255,255,.4) inset;
            transition: all 0.2s;
        }
        .btn-amazon:hover { background: linear-gradient(180deg, #f5d78e 0%, #eeb933 100%); transform: translateY(-1px); }
        .btn-amazon:active { transform: translateY(1px); box-shadow: none; }

        .voto-badge { background: #000; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; }
        .correlati-box { background: #f9f9f9; border-radius: 16px; padding: 20px; margin-top: 30px; border: 1px solid #eee; }
        
        article { padding-bottom: 80px; margin-bottom: 80px; border-bottom: 1px solid #f0f0f0; }
        article:last-child { border-bottom: none; }

        /* FAQ */
        .faq-answer { display: none; }
        .faq-item.active .faq-answer { display: block; animation: fadeIn 0.3s ease; }
        .faq-item span { transition: transform 0.3s; }
        .faq-item.active span { transform: rotate(180deg); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white">

    <header class="py-12 border-b border-gray-100 text-center container-custom">
        <h1 class="text-4xl font-black tracking-tighter uppercase italic">The Essential <span class="text-gray-200">List</span></h1>
        <p class="text-[10px] text-gray-400 tracking-[0.4em] uppercase mt-3 font-bold">Consigli per gli acquisti • Primavera 2026</p>
    </header>

    <nav class="sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-gray-50">
        <div id="menu-categorie" class="container-custom flex space-x-8 overflow-x-auto no-scrollbar py-5 text-[11px] font-bold uppercase tracking-widest text-gray-400 justify-start md:justify-center">
            </div>
    </nav>

    <main id="content-main" class="container-custom pt-12">
        </main>

    <footer class="py-20 text-center text-[10px] text-gray-400 uppercase tracking-widest border-t border-gray-100 container-custom">
        <p>© 2026 THE ESSENTIAL LIST</p>
        <p class="mt-2 font-bold italic text-gray-300">In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
